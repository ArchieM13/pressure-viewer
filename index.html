<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedure Data</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f7fb;
    color: #1a1f2b;
    padding: 16px;
    max-width: 900px;
    margin: 0 auto;
}
h1 {
    font-size: 22px;
    margin-bottom: 4px;
    color: #000000;
}
.subtitle {
    color: #4a5568;
    font-size: 14px;
    margin-bottom: 20px;
}
.card {
    background: white;
    border: 1px solid #c5d3e3;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
}
.card-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8696aa;
    margin-bottom: 8px;
}
.summary {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}
.stat {
    background: white;
    border: 1px solid #c5d3e3;
    border-top: 3px solid #74E0AF;
    border-radius: 6px;
    padding: 12px;
}
.stat-label {
    font-size: 11px;
    text-transform: uppercase;
    color: #8696aa;
    letter-spacing: 0.5px;
}
.stat-value {
    font-size: 24px;
    font-weight: 600;
    color: #1a1f2b;
    margin-top: 4px;
}
canvas {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid #dde6f0;
    border-radius: 4px;
    background: #fafcff;
}
.legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 12px;
    color: #4a5568;
}
.legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
}
.dot-alert { background: #cc0000; }
.dot-event { background: #000000; }
.events {
    list-style: none;
}
.event {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #dde6f0;
}
.event:last-child { border-bottom: none; }
.event-label {
    font-weight: 500;
}
.event-pressure {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: #1a1f2b;
    font-weight: 600;
}
.event-time {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: #4a5568;
    min-width: 60px;
    text-align: right;
}
.event-alert .event-label { color: #cc0000; }
.event-dismiss .event-label { color: #4a5568; }
.event-logged .event-label { color: #000000; }
.error {
    background: #fee;
    border: 1px solid #fcc;
    color: #900;
    padding: 16px;
    border-radius: 6px;
}
.no-events {
    color: #8696aa;
    font-style: italic;
    padding: 8px 0;
}
@media (max-width: 600px) {
    .summary { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<h1>Pressure Monitor Procedure Report</h1>
<div class="subtitle">Decoded from device QR code</div>

<div id="content"></div>

<script>
const PRESSURE_MAX = 25.0;
const SAMPLE_INTERVAL_S = 0.5;

const EVENT_TYPES = {
    1: { name: "NEEDLE ERROR",   class: "event-alert",   isAlert: true  },
    2: { name: "LOW PRESSURE",   class: "event-alert",   isAlert: true  },
    3: { name: "HIGH PRESSURE",  class: "event-alert",   isAlert: true  },
    4: { name: "IVD FULL",       class: "event-alert",   isAlert: true  },
    5: { name: "Event Logged",   class: "event-logged",  isAlert: false },
    6: { name: "Alert Dismissed", class: "event-dismiss", isAlert: false },
};

function decodeBase64URL(str) {
    const b64chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
    const out = [];
    let i = 0;
    while (i < str.length) {
        const c1 = b64chars.indexOf(str[i++]);
        const c2 = b64chars.indexOf(str[i++]);
        const c3 = i < str.length ? b64chars.indexOf(str[i++]) : -1;
        const c4 = i < str.length ? b64chars.indexOf(str[i++]) : -1;
        if (c1 < 0 || c2 < 0) break;
        const v = (c1 << 18) | (c2 << 12) | ((c3 < 0 ? 0 : c3) << 6) | (c4 < 0 ? 0 : c4);
        out.push((v >> 16) & 0xFF);
        if (c3 >= 0) out.push((v >> 8) & 0xFF);
        if (c4 >= 0) out.push(v & 0xFF);
    }
    return out;
}

function parseBlob(bytes) {
    let idx = 0;
    const version = bytes[idx++];
    if (version !== 0x01) throw new Error("Unsupported data version: " + version);

    const sampleCount = (bytes[idx++] << 8) | bytes[idx++];
    const samples = [];
    for (let i = 0; i < sampleCount; i++) {
        const b = bytes[idx++];
        samples.push((b / 255) * PRESSURE_MAX);
    }

    const eventCount = bytes[idx++];
    const events = [];
    for (let i = 0; i < eventCount; i++) {
        const type = bytes[idx++];
        const ts = (bytes[idx++] << 8) | bytes[idx++];
        events.push({ type, timestampS: ts });
    }

    return { samples, events };
}

// Get pressure at a given time in seconds (interpolate between samples)
function pressureAtTime(samples, timeS) {
    if (samples.length === 0) return 0;
    const idx = timeS / SAMPLE_INTERVAL_S;
    const i0 = Math.floor(idx);
    const i1 = Math.min(i0 + 1, samples.length - 1);
    if (i0 < 0) return samples[0];
    if (i0 >= samples.length) return samples[samples.length - 1];
    const t = idx - i0;
    return samples[i0] * (1 - t) + samples[i1] * t;
}

function drawGraph(canvas, samples, events) {
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.clientWidth;
    const cssH = 320;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.height = cssH + "px";
    ctx.scale(dpr, dpr);

    const padL = 40, padR = 16, padT = 16, padB = 28;
    const w = cssW - padL - padR;
    const h = cssH - padT - padB;

    ctx.fillStyle = "#fafcff";
    ctx.fillRect(0, 0, cssW, cssH);

    // Y-axis grid + labels
    ctx.strokeStyle = "#dde6f0";
    ctx.fillStyle = "#8696aa";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    for (let i = 0; i <= 5; i++) {
        const v = (PRESSURE_MAX / 5) * i;
        const y = padT + h - (v / PRESSURE_MAX) * h;
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(padL + w, y);
        ctx.stroke();
        ctx.fillText(v.toFixed(0), padL - 4, y);
    }

    // X-axis labels
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    const totalS = samples.length * SAMPLE_INTERVAL_S;
    const stepS = totalS > 60 ? 30 : (totalS > 20 ? 10 : 5);
    for (let s = 0; s <= totalS; s += stepS) {
        const x = padL + (s / totalS) * w;
        ctx.fillText(s + "s", x, padT + h + 6);
    }

    // Pressure trace
    if (samples.length > 1) {
        ctx.strokeStyle = "#74E0AF";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < samples.length; i++) {
            const x = padL + (i / (samples.length - 1)) * w;
            const y = padT + h - (samples[i] / PRESSURE_MAX) * h;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // Event markers on the trace
    for (const ev of events) {
        const meta = EVENT_TYPES[ev.type];
        if (!meta) continue;
        // Skip dismiss markers — they clutter and aren't an event point
        if (ev.type === 6) continue;

        const pressure = pressureAtTime(samples, ev.timestampS);
        const x = padL + (ev.timestampS / totalS) * w;
        const y = padT + h - (pressure / PRESSURE_MAX) * h;

        ctx.fillStyle = meta.isAlert ? "#cc0000" : "#000000";
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fill();

        // White ring for visibility
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // Border
    ctx.strokeStyle = "#c5d3e3";
    ctx.lineWidth = 1;
    ctx.strokeRect(padL, padT, w, h);
}

function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function render() {
    const content = document.getElementById("content");
    const hash = window.location.hash.replace("#", "");

    if (!hash) {
        content.innerHTML = '<div class="error">No data found in URL.</div>';
        return;
    }

    let data;
    try {
        const bytes = decodeBase64URL(hash);
        data = parseBlob(bytes);
    } catch (e) {
        content.innerHTML = '<div class="error">Failed to decode data: ' + e.message + '</div>';
        return;
    }

    const { samples, events } = data;
    const durationS = Math.round(samples.length * SAMPLE_INTERVAL_S);
    const peak = samples.length ? Math.max(...samples).toFixed(1) : "—";

    let eventHTML;
    if (events.length === 0) {
        eventHTML = '<div class="no-events">No events recorded during procedure.</div>';
    } else {
        eventHTML = '<ul class="events">' + events.map(e => {
            const meta = EVENT_TYPES[e.type] || { name: "Unknown (" + e.type + ")", class: "" };
            const pressure = pressureAtTime(samples, e.timestampS).toFixed(1);
            return `<li class="event ${meta.class}">
                <span class="event-label">${meta.name}</span>
                <span class="event-pressure">${pressure}</span>
                <span class="event-time">${fmtTime(e.timestampS)}</span>
            </li>`;
        }).join("") + '</ul>';
    }

    content.innerHTML = `
        <div class="summary">
            <div class="stat">
                <div class="stat-label">Duration</div>
                <div class="stat-value">${fmtTime(durationS)}</div>
            </div>
            <div class="stat">
                <div class="stat-label">Peak</div>
                <div class="stat-value">${peak}</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Pressure Trace</div>
            <canvas id="graph"></canvas>
            <div class="legend">
                <span><span class="legend-dot dot-alert"></span>Alert triggered</span>
                <span><span class="legend-dot dot-event"></span>Event logged</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Event Log (${events.length})</div>
            ${eventHTML}
        </div>
    `;

    drawGraph(document.getElementById("graph"), samples, events);
}

render();
window.addEventListener("hashchange", render);
</script>

</body>
</html>
