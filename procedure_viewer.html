<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedure Data</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f7fb;
    color: #1a1f2b;
    padding: 16px;
    max-width: 900px;
    margin: 0 auto;
}
h1 {
    font-size: 22px;
    margin-bottom: 4px;
    color: #003d82;
}
.subtitle {
    color: #4a5568;
    font-size: 14px;
    margin-bottom: 20px;
}
.card {
    background: white;
    border: 1px solid #c5d3e3;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
}
.card-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8696aa;
    margin-bottom: 8px;
}
.summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}
.stat {
    background: white;
    border: 1px solid #c5d3e3;
    border-top: 3px solid #0055b8;
    border-radius: 6px;
    padding: 12px;
}
.stat-label {
    font-size: 11px;
    text-transform: uppercase;
    color: #8696aa;
    letter-spacing: 0.5px;
}
.stat-value {
    font-size: 24px;
    font-weight: 600;
    color: #1a1f2b;
    margin-top: 4px;
}
canvas {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid #dde6f0;
    border-radius: 4px;
    background: #fafcff;
}
.events {
    list-style: none;
}
.event {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #dde6f0;
}
.event:last-child { border-bottom: none; }
.event-label {
    font-weight: 500;
}
.event-time {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: #4a5568;
}
.event-alert .event-label { color: #cc0000; }
.event-dismiss .event-label { color: #4a5568; }
.event-logged .event-label { color: #0055b8; }
.error {
    background: #fee;
    border: 1px solid #fcc;
    color: #900;
    padding: 16px;
    border-radius: 6px;
}
.no-events {
    color: #8696aa;
    font-style: italic;
    padding: 8px 0;
}
@media (max-width: 600px) {
    .summary { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<h1>Pressure Monitor — Procedure Report</h1>
<div class="subtitle">Decoded from device QR code</div>

<div id="content"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────
const PRESSURE_MAX = 25.0;
const SAMPLE_INTERVAL_S = 0.5;

const EVENT_TYPES = {
    1: { name: "NEEDLE ERROR",  class: "event-alert"   },
    2: { name: "LOW PRESSURE",  class: "event-alert"   },
    3: { name: "HIGH PRESSURE", class: "event-alert"   },
    4: { name: "IVD FULL",      class: "event-alert"   },
    5: { name: "Event Logged",  class: "event-logged"  },
    6: { name: "Alert Dismissed", class: "event-dismiss" },
};

// ── Base64 decoder (URL-safe variant) ──────────────────────────────
function decodeBase64URL(str) {
    const b64chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
    const out = [];
    let i = 0;
    while (i < str.length) {
        const c1 = b64chars.indexOf(str[i++]);
        const c2 = b64chars.indexOf(str[i++]);
        const c3 = i < str.length ? b64chars.indexOf(str[i++]) : -1;
        const c4 = i < str.length ? b64chars.indexOf(str[i++]) : -1;
        if (c1 < 0 || c2 < 0) break;
        const v = (c1 << 18) | (c2 << 12) | ((c3 < 0 ? 0 : c3) << 6) | (c4 < 0 ? 0 : c4);
        out.push((v >> 16) & 0xFF);
        if (c3 >= 0) out.push((v >> 8) & 0xFF);
        if (c4 >= 0) out.push(v & 0xFF);
    }
    return out;
}

// ── Decode the procedure blob ──────────────────────────────────────
function parseBlob(bytes) {
    let idx = 0;
    const version = bytes[idx++];
    if (version !== 0x01) throw new Error("Unsupported data version: " + version);

    const sampleCount = (bytes[idx++] << 8) | bytes[idx++];
    const samples = [];
    for (let i = 0; i < sampleCount; i++) {
        const b = bytes[idx++];
        samples.push((b / 255) * PRESSURE_MAX);
    }

    const eventCount = bytes[idx++];
    const events = [];
    for (let i = 0; i < eventCount; i++) {
        const type = bytes[idx++];
        const ts = (bytes[idx++] << 8) | bytes[idx++];
        events.push({ type, timestampS: ts });
    }

    return { samples, events };
}

// ── Draw the graph on canvas ───────────────────────────────────────
function drawGraph(canvas, samples) {
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.clientWidth;
    const cssH = 300;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.height = cssH + "px";
    ctx.scale(dpr, dpr);

    const padL = 40, padR = 16, padT = 16, padB = 28;
    const w = cssW - padL - padR;
    const h = cssH - padT - padB;

    // Background
    ctx.fillStyle = "#fafcff";
    ctx.fillRect(0, 0, cssW, cssH);

    // Y-axis grid + labels
    ctx.strokeStyle = "#dde6f0";
    ctx.fillStyle = "#8696aa";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    for (let i = 0; i <= 5; i++) {
        const v = (PRESSURE_MAX / 5) * i;
        const y = padT + h - (v / PRESSURE_MAX) * h;
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(padL + w, y);
        ctx.stroke();
        ctx.fillText(v.toFixed(0), padL - 4, y);
    }

    // X-axis labels (time in seconds)
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    const totalS = samples.length * SAMPLE_INTERVAL_S;
    const stepS = totalS > 60 ? 30 : (totalS > 20 ? 10 : 5);
    for (let s = 0; s <= totalS; s += stepS) {
        const x = padL + (s / totalS) * w;
        ctx.fillText(s + "s", x, padT + h + 6);
    }

    // Pressure trace
    if (samples.length > 1) {
        ctx.strokeStyle = "#0055b8";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < samples.length; i++) {
            const x = padL + (i / (samples.length - 1)) * w;
            const y = padT + h - (samples[i] / PRESSURE_MAX) * h;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // Border
    ctx.strokeStyle = "#c5d3e3";
    ctx.lineWidth = 1;
    ctx.strokeRect(padL, padT, w, h);
}

// ── Format duration ────────────────────────────────────────────────
function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

// ── Main ───────────────────────────────────────────────────────────
function render() {
    const content = document.getElementById("content");
    const hash = window.location.hash.replace("#", "");

    if (!hash) {
        content.innerHTML = '<div class="error">No data found in URL. This page expects a base64 data string after #.</div>';
        return;
    }

    let data;
    try {
        const bytes = decodeBase64URL(hash);
        data = parseBlob(bytes);
    } catch (e) {
        content.innerHTML = '<div class="error">Failed to decode data: ' + e.message + '</div>';
        return;
    }

    const { samples, events } = data;
    const durationS = Math.round(samples.length * SAMPLE_INTERVAL_S);
    const peak = samples.length ? Math.max(...samples).toFixed(1) : "—";
    const avg = samples.length ? (samples.reduce((a, b) => a + b, 0) / samples.length).toFixed(1) : "—";

    let eventHTML;
    if (events.length === 0) {
        eventHTML = '<div class="no-events">No events recorded during procedure.</div>';
    } else {
        eventHTML = '<ul class="events">' + events.map(e => {
            const meta = EVENT_TYPES[e.type] || { name: "Unknown (" + e.type + ")", class: "" };
            return `<li class="event ${meta.class}">
                <span class="event-label">${meta.name}</span>
                <span class="event-time">${fmtTime(e.timestampS)}</span>
            </li>`;
        }).join("") + '</ul>';
    }

    content.innerHTML = `
        <div class="summary">
            <div class="stat">
                <div class="stat-label">Duration</div>
                <div class="stat-value">${fmtTime(durationS)}</div>
            </div>
            <div class="stat">
                <div class="stat-label">Peak</div>
                <div class="stat-value">${peak}</div>
            </div>
            <div class="stat">
                <div class="stat-label">Average</div>
                <div class="stat-value">${avg}</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Pressure Trace</div>
            <canvas id="graph"></canvas>
        </div>

        <div class="card">
            <div class="card-title">Event Log (${events.length})</div>
            ${eventHTML}
        </div>
    `;

    drawGraph(document.getElementById("graph"), samples);
}

render();
window.addEventListener("hashchange", render);
</script>

</body>
</html>
